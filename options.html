<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FTUI Smart Navigation</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for that clean UI look -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-box">
        <div style="display: flex; flex-direction: row;">
            <div class="img-bounding-box" style="margin-left: 5ch; margin-top: 5ch;"></div>
            <div style="display: flex; flex-direction: column; margin-left: 5ch; margin-top: 5ch;">
                <text class="text1">Gedung K </text>
                <text class="text1">K.210 </text>
                <text class="text2">300 m</text>
                <text class="text2">10 menit</text>
            </div>
        </div>
        
        <text class="text1" style="display:flex; margin-top:1ch; align-items: center; justify-content: center;">Options:</text>

        <div style="display: flex; flex-direction: column; flex-wrap: wrap;">
            <text class="text1" style="margin-top:1ch; margin-left:1.5ch">Accesibility:</text>
            <div style="display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; margin-left: 7ch;">
                <input class="checkboxing" type="checkbox" id="subscribe" name="subscribe" value="newsletter">
                <text class="text2" style="margin-left: 1ch;">Prefer fastest route</text>
            </div>
            <div style="display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; margin-left: 7ch;">
                <input class="checkboxing" type="checkbox" id="subscribe" name="subscribe" value="newsletter">
                <text class="text2" style="margin-left: 1ch;">Prefer shortest route</text>
            </div>
            <div style="display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; margin-left: 7ch;">
                <input class="checkboxing" type="checkbox" id="subscribe" name="subscribe" value="newsletter">
                <text class="text2" style="margin-left: 1ch;">Prefer escalator/ramp</text>
            </div>
            <div style="display: flex; flex-direction: row; flex-wrap: wrap; align-items: center; margin-left: 7ch;">
                <input class="checkboxing" type="checkbox" id="subscribe" name="subscribe" value="newsletter">
                <text class="text2" style="margin-left: 1ch;">Prefer covered walkways</text>
            </div>
        </div>

        <div class="navigation">START NAVIGATION</div>

        <div style="height:10ch"></div>

    </div>

    <div style="height:10ch"></div>

    <!-- Bottom Right Controls -->
    <div class="map-controls">
        <button>+</button>
        <button>-</button>
    </div>

</body>
</html>
