<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faculty Spots</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    input[type="text"] { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; flex: 1; }
    .filter-btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 20px; background: white; cursor: pointer; font-size: 13px; }
    .filter-btn.active { background: #1d6fca; color: white; border-color: #1d6fca; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #f5f5f5; padding: 10px; text-align: left; cursor: pointer; border-bottom: 2px solid #ddd; }
    th:hover { background: #eaeaea; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #fafafa; }
    .badge { padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .food   { background: #fef3c7; color: #92400e; }
    .study  { background: #dbeafe; color: #1e40af; }
    .prayer { background: #dcfce7; color: #166534; }
    .social { background: #ede9fe; color: #5b21b6; }
    .service{ background: #fee2e2; color: #991b1b; }
    .health { background: #fce7f3; color: #9d174d; }
    #count  { font-size: 13px; color: #888; margin-bottom: 6px; }
  </style>
</head>
<body>

<div class="controls">
  <input type="text" id="search" placeholder="Search spots..." oninput="render()">
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="filter-btn active" data-cat="all"     onclick="setFilter(this)">All</button>
    <button class="filter-btn"       data-cat="food"     onclick="setFilter(this)">Food</button>
    <button class="filter-btn"       data-cat="study"    onclick="setFilter(this)">Study</button>
    <button class="filter-btn"       data-cat="prayer"   onclick="setFilter(this)">Prayer</button>
    <button class="filter-btn"       data-cat="social"   onclick="setFilter(this)">Social</button>
    <button class="filter-btn"       data-cat="service"  onclick="setFilter(this)">Service</button>
    <button class="filter-btn"       data-cat="health"   onclick="setFilter(this)">Health</button>
  </div>
</div>

<p id="count"></p>

<table>
  <thead>
    <tr>
      <th onclick="sortBy(0)">Spot name</th>
      <th onclick="sortBy(1)">Category</th>
      <th onclick="sortBy(2)">Floor</th>
      <th onclick="sortBy(3)">Hours</th>
      <th onclick="sortBy(4)">Description</th>
      <th onclick="sortBy(5)">Status</th>
      <th onclick="sortBy(6)">Crowd</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
  // ── YOUR DATA GOES HERE ──────────────────────────────────────────────
  // Each row: [Name, Category, Floor, Hours, Description, Status, Crowd]
  const spots = [
    ["Main canteen",          "food",    "Ground", "7:30am – 5:00pm",  "Full cafeteria, hot meals daily",        "Open",     "High"],
    ["Mini mart",             "food",    "Ground", "8:00am – 6:00pm",  "Snacks, drinks, stationery",             "Open",     "Low"],
    ["Cafeteria block B",     "food",    "Ground", "7:00am – 3:00pm",  "Cheaper stalls, variety of food",        "Closed",   "—"],
    ["Faculty library",       "study",   "Level 2","8:00am – 9:00pm",  "Quiet study, reference books",           "Open",     "Low"],
    ["Discussion room A",     "study",   "Level 3","8:00am – 8:00pm",  "Bookable group study room (6 pax)",      "Bookable", "Medium"],
    ["Discussion room B",     "study",   "Level 3","8:00am – 8:00pm",  "Bookable group study room (10 pax)",     "Bookable", "Low"],
    ["Computer lab 1",        "study",   "Level 2","8:00am – 6:00pm",  "50 PCs, printing available",             "Open",     "Medium"],
    ["Prayer room (male)",    "prayer",  "Level 1","Always open",       "Dedicated surau, male students",         "Open",     "Low"],
    ["Prayer room (female)",  "prayer",  "Level 2","Always open",       "Dedicated surau, female students",       "Open",     "Low"],
    ["Student lounge",        "social",  "Level 1","8:00am – 10:00pm", "Sofas, TV, casual hangout area",         "Open",     "Medium"],
    ["Rooftop garden",        "social",  "Level 4","8:00am – 7:00pm",  "Open-air seating, great view",           "Open",     "Low"],
    ["Printing room",         "service", "Ground", "8:30am – 4:30pm",  "Self-service printing & scanning",       "Open",     "Medium"],
    ["Student affairs office","service", "Level 1","8:00am – 5:00pm",  "Admin, forms, student matters",          "Open",     "Medium"],
    ["Clinic",                "health",  "Ground", "8:30am – 4:00pm",  "Basic medical assistance",               "Open",     "Low"],
  ];
  // ────────────────────────────────────────────────────────────────────

  let activeFilter = "all";
  let sortCol = -1;
  let sortDir = 1;

  function setFilter(btn) {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeFilter = btn.dataset.cat;
    render();
  }

  function sortBy(col) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    render();
  }

  function render() {
    const q = document.getElementById("search").value.toLowerCase();
    let rows = spots.filter(r =>
      (activeFilter === "all" || r[1] === activeFilter) &&
      (!q || r[0].toLowerCase().includes(q) || r[4].toLowerCase().includes(q))
    );
    if (sortCol >= 0) {
      rows.sort((a, b) => sortDir * a[sortCol].localeCompare(b[sortCol]));
    }
    document.getElementById("count").textContent =
      `Showing ${rows.length} of ${spots.length} spots`;
    document.getElementById("tbody").innerHTML = rows.map(r => `
      <tr>
        <td><strong>${r[0]}</strong></td>
        <td><span class="badge ${r[1]}">${r[1].charAt(0).toUpperCase()+r[1].slice(1)}</span></td>
        <td>${r[2]}</td>
        <td>${r[3]}</td>
        <td>${r[4]}</td>
        <td>${r[5]}</td>
        <td>${r[6]}</td>
      </tr>`).join("");
  }

  render();
</script>
</body>
</html>
