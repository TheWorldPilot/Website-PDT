<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FTUI Smart Navigation</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for that clean UI look -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="topbar"></div>

    <div style="height: 10ch"></div>

    <center>
    <text class="title-text">Welcome to</text>

    <header>FTUI SMART NAVIGATION SYSTEM</header>
    </center>

    <div class="search-main-page">
        <div style="margin-top: 4ch; display: inline-block;">
            <text style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 5ch; margin-left: 4ch; margin-top: 2ch; color: white">
        Where do you want to go?</text></div>
        <div class="search-box" contenteditable="true">
            <img src="images/search-button.svg" style="width: 40px; padding-right: 10px;">
            <div class="search-box-text" contenteditable="true">
            </div>
        </div>
    </div>



    <!-- Bottom Right Controls -->
    <div class="map-controls">
        <button>+</button>
        <button>-</button>
    </div>

</body>
</html>
