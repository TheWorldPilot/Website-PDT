<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapNav - Find Your Way</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for that clean UI look -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

    <!-- The Map Background -->
    <div id="map-canvas">
        <div class="map-placeholder">
            <p>Map View Simulation</p>
        </div>
    </div>

    <!-- Floating Navigation Sidebar -->
    <aside class="search-container">
        <div class="search-box">
            <button class="menu-btn">☰</button>
            <input type="text" placeholder="Search Google Maps" aria-label="search">
            <button class="search-icon">🔍</button>
            <div class="divider"></div>
            <button class="directions-btn">↗</button>
        </div>

        <div class="category-pills">
            <button class="pill">Restaurants</button>
            <button class="pill">Hotels</button>
            <button class="pill">Gas</button>
            <button class="pill">Museums</button>
        </div>
    </aside>

    <!-- Bottom Right Controls -->
    <div class="map-controls">
        <button>+</button>
        <button>−</button>
    </div>

</body>
</html>
